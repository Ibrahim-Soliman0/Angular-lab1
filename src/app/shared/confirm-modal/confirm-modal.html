<!-- Backdrop -->
<div class="modal-backdrop" (click)="cancel.emit()"></div>

<!-- Dialog -->
<div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">

  <!-- Icon -->
  <div class="modal-icon" [class.modal-icon-danger]="danger()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
  </div>

  <h2 class="modal-title" id="modal-title">Delete Product</h2>

  <p class="modal-body">
    Are you sure you want to delete
    <strong class="modal-product-name">{{ productName() }}</strong>?
    This action cannot be undone.
  </p>

  <div class="modal-actions">
    <button class="btn-modal-cancel" (click)="cancel.emit()">
      Cancel
    </button>
    <button class="btn-modal-confirm" (click)="confirm.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
      </svg>
      Yes, Delete
    </button>
  </div>

</div>
